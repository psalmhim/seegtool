# BIDS Configuration for Patient sub-EP01AN96M1047
# YUHS SEEG Cognitive Task Study
# Generated: 2026-03-14
# Updated: 2026-03-15 (v2 schema with annotation_scheme, trial_grouping, etc.)

participant_id: "sub-EP01AN96M1047"
demographics:
  age: 29
  sex: "M"
  handedness: "R"
  pathology: "drug-resistant epilepsy"

# Pipeline control
pipeline:
  steps: ["scaffold", "split_edf", "sidecars", "events", "copy_anat", "readmes", "validate"]
  incremental: false

# Modality selection
modalities_include:
  anat: true
  dwi: true
  func: true
  pet: true
  ieeg: true
  derivatives: true

# Seizure onset zone (researcher-provided)
soz:
  electrodes: []
  description: ""
  determination_method: "clinical consensus from SEEG monitoring"

# EDF annotation → standard event type mapping
event_type_mapping:
  fixation: "fixation"
  stimuli: "stimulus"
  stim_on: "stimulus"
  stim_off: "stimulus_offset"
  response: "response"
  isi: "isi"
  probe: "probe"

# Task descriptions for ieeg.json sidecar
task_descriptions:
  lexicaldecision: "Visual word/nonword discrimination task. Patient views an image showing a word or nonword and presses A (left) or L (right) to categorize."
  shapecontrol: "Shape matching control task. Patient views geometric shapes and presses A or L to indicate if the shapes match. Non-linguistic control for lexical decision tasks."
  sentencenoun: "Sentence-noun semantic judgment task. Patient reads a sentence and noun image, then judges if the noun is semantically congruent with the sentence."
  sentencegrammar: "Sentence grammaticality judgment task. Patient reads a sentence and judges whether it is grammatically correct or incorrect."
  saliencepain: "Passive viewing of pain-related images. Patient views images depicting painful or neutral scenes with no response required."
  balloonwatching: "Passive viewing of balloon inflation videos. Patient watches videos of balloons being inflated with no response required."
  viseme: "Visual speech perception 2-alternative forced choice task. Patient watches a video of a talker producing a viseme and selects the matching syllable from two options."
  visemegen: "Visual speech generalization 2-AFC task. Same paradigm as viseme task but with a novel talker (kjj) to test generalization of visual speech learning."
  visualrhythm: "Passive viewing of lip rhythm videos. Patient watches videos of lip movements with varying rhythmic properties."

# EDF annotation schemes (per EDF file)
edf_annotation_schemes:
  "260311/STUDY001.EDF":
    mode: "sequential"
    start_label: "task_start"
    end_label: "task_end"
    task_order:
      - {ses: "ses-task05", bids_task: "saliencepain", run: 1}
      - {ses: "ses-task06", bids_task: "balloonwatching", run: 1}
      - {ses: "ses-task01", bids_task: "lexicaldecision", run: 1}
      - {ses: "ses-task03", bids_task: "sentencenoun", run: 1}
      - {ses: "ses-task02", bids_task: "shapecontrol", run: 1}
      - {ses: "ses-task04", bids_task: "sentencegrammar", run: 1}

  "260312/STUDY002.EDF":
    mode: "labeled"
    start_labels: ["task_start_esk_b1", "task_start_esk_b2"]
    end_label: "task_end"
    skip_labels: ["task_start_prac", "start"]
    task_mapping:
      task_start_esk_b1: {ses: "ses-task08", bids_task: "viseme", run: 1}
      task_start_esk_b2: {ses: "ses-task08", bids_task: "viseme", run: 2}

  "260312/STUDY003.EDF":
    mode: "labeled"
    start_labels: ["task_start_kjj_b1"]
    end_label: "task_end"
    skip_labels: ["task_start_prac"]
    task_mapping:
      task_start_kjj_b1: {ses: "ses-task08", bids_task: "visemegen", run: 1}

  "260313/STUDY004.EDF":
    mode: "labeled"
    start_labels: ["task_start_esk_b3", "task_rhy_ses12_start"]
    end_label: "task_end"
    skip_labels: ["task_start_prac", "task_rhy_prac_start"]
    task_mapping:
      task_start_esk_b3: {ses: "ses-task08", bids_task: "viseme", run: 3}
      task_rhy_ses12_start:
        ses: "ses-task10"
        bids_task: "visualrhythm"
        run_start: 1  # first occurrence gets run=1, second gets run=2, etc.
        auto_increment: true

